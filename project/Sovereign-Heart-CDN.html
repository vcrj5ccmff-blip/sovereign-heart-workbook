/* ── ANNOTATIONS ── */
function loadAnnots(page){
  try{return JSON.parse(localStorage.getItem('ssh_annot_'+page)||'[]');}catch(e){return [];}
}
function saveAnnots(page,arr){
  try{localStorage.setItem('ssh_annot_'+page,JSON.stringify(arr));}catch(e){}
}

// Walk text nodes inside `root`, returning array of {node, start, end} where start/end are global character offsets.
function getTextNodeMap(root){
  const map=[]; let pos=0;
  const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
    acceptNode(n){
      // Skip text inside form controls and existing markers
      const p=n.parentElement;
      if(!p)return NodeFilter.FILTER_REJECT;
      if(p.closest('textarea,input,.note-marker,.annot-toolbar,.note-popover'))return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  let n;
  while((n=w.nextNode())){
    const len=n.nodeValue.length;
    map.push({node:n,start:pos,end:pos+len});
    pos+=len;
  }
  return {map,total:pos};
}

// Find Nth occurrence of `text` in `.page` content, return Range or null
function findTextRange(root,text,occurrence){
  if(!text)return null;
  const {map}=getTextNodeMap(root);
  const full=map.map(m=>m.node.nodeValue).join('');
  let idx=-1, count=0;
  while(true){
    idx=full.indexOf(text,idx+1);
    if(idx<0)return null;
    if(count===occurrence)break;
    count++;
  }
  const endIdx=idx+text.length;
  // Locate start node/offset
  const startEntry=map.find(m=>idx>=m.start && idx<m.end);
  const endEntry=map.find(m=>endIdx>m.start && endIdx<=m.end);
  if(!startEntry||!endEntry)return null;
  const r=document.createRange();
  r.setStart(startEntry.node, idx-startEntry.start);
  r.setEnd(endEntry.node, endIdx-endEntry.start);
  return r;
}

// Compute the occurrence index of currently selected text within root
function getSelectionOccurrence(root,sel){
  const text=sel.toString();
  if(!text)return null;
  const {map}=getTextNodeMap(root);
  const full=map.map(m=>m.node.nodeValue).join('');
  // Find global offset of selection start
  const r=sel.getRangeAt(0);
  const startEntry=map.find(m=>m.node===r.startContainer);
  if(!startEntry)return null;
  const globalStart=startEntry.start+r.startOffset;
  // Count occurrences of text before globalStart
  let count=0,idx=-1;
  while((idx=full.indexOf(text,idx+1))>=0 && idx<globalStart){count++;}
  return {text,occurrence:count};
}

// Wrap a Range in a span (works across multiple text nodes)
function wrapRange(range,className,attrs){
  const nodes=[];
  const root=range.commonAncestorContainer;
  if(root.nodeType===Node.TEXT_NODE){
    nodes.push(root);
  } else {
    const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null);
    let n;
    while((n=w.nextNode())){
      if(range.intersectsNode(n))nodes.push(n);
    }
  }
  const wraps=[];
  nodes.forEach(node=>{
    const isStart=node===range.startContainer;
    const isEnd=node===range.endContainer;
    const startOff=isStart?range.startOffset:0;
    const endOff=isEnd?range.endOffset:node.nodeValue.length;
    if(startOff>=endOff)return;
    const before=node.nodeValue.slice(0,startOff);
    const middle=node.nodeValue.slice(startOff,endOff);
    const after=node.nodeValue.slice(endOff);
    const span=document.createElement('span');
    span.className=className;
    if(attrs)Object.entries(attrs).forEach(([k,v])=>span.setAttribute(k,v));
    span.textContent=middle;
    const parent=node.parentNode;
    const frag=document.createDocumentFragment();
    if(before)frag.appendChild(document.createTextNode(before));
    frag.appendChild(span);
    if(after)frag.appendChild(document.createTextNode(after));
    parent.replaceChild(frag,node);
    wraps.push(span);
  });
  return wraps;
}

function applyAnnotations(root,annots,onMarkerClick){
  if(!root||!annots.length)return;
  // Process in order; later annotations may need to find text after earlier ones are wrapped.
  annots.forEach((a,i)=>{
    const range=findTextRange(root,a.text,a.occurrence);
    if(!range)return;
    const wraps=wrapRange(range,'hl'+(a.note?' has-note':''),{'data-id':a.id});
    // Append numbered marker after the last wrap if there's a note
    if(a.note && wraps.length){
      const last=wraps[wraps.length-1];
      const marker=document.createElement('sup');
      marker.className='note-marker';
      marker.textContent=String(i+1);
      marker.dataset.id=a.id;
      marker.addEventListener('click',e=>{
        e.stopPropagation();
        onMarkerClick(a.id,marker);
      });
      last.parentNode.insertBefore(marker,last.nextSibling);
    }
    // Click highlight to open popover too
    wraps.forEach(span=>{
      span.addEventListener('click',e=>{
        e.stopPropagation();
        onMarkerClick(a.id,span);
      });
    });
  });
}

function App(){
  const [page,setPage]=useState(()=>{try{return parseInt(localStorage.getItem('ssh_page')||'0');}catch(e){return 0;}});
  const [printMode,setPrintMode]=useState(false);
  const [annots,setAnnots]=useState(()=>loadAnnots(0));
  const [toolbar,setToolbar]=useState(null); // {x,y,text,occurrence}
  const [popover,setPopover]=useState(null); // {id,x,y}
  const total=PAGES.length;
  const pageRef=React.useRef(null);

  const go=useCallback(n=>{
    const next=Math.max(0,Math.min(total-1,n));
    setPage(next);
    try{localStorage.setItem('ssh_page',next);}catch(e){}
    setToolbar(null);setPopover(null);
    window.scrollTo(0,0);
  },[total]);

  useEffect(()=>{
    const h=e=>{
      if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
      if(e.key==='ArrowRight')go(page+1);
      if(e.key==='ArrowLeft')go(page-1);
      if(e.key==='Escape'){setToolbar(null);setPopover(null);}
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[page,go]);

  useEffect(()=>{document.body.classList.toggle('print-mode',printMode);},[printMode]);

  // Reload annotations when page changes
  useEffect(()=>{ setAnnots(loadAnnots(page)); },[page]);

  // Re-apply annotations whenever annots or page content changes
  useEffect(()=>{
    if(!pageRef.current)return;
    // The block renderer rebuilds DOM each render, so we just decorate after paint.
    const id=requestAnimationFrame(()=>{
      if(!pageRef.current)return;
      applyAnnotations(pageRef.current,annots,(annotId,el)=>{
        const rect=el.getBoundingClientRect();
        setPopover({
          id:annotId,
          x:rect.left+rect.width/2+window.scrollX,
          y:rect.bottom+window.scrollY
        });
        setToolbar(null);
      });
    });
    return()=>cancelAnimationFrame(id);
  },[annots,page,printMode]);

  // Selection handler — show toolbar above selection
  useEffect(()=>{
    const onUp=()=>{
      const sel=window.getSelection();
      if(!sel||sel.isCollapsed||!pageRef.current){setToolbar(null);return;}
      const text=sel.toString().trim();
      if(text.length<2){setToolbar(null);return;}
      // Selection must be inside .page
      const r=sel.getRangeAt(0);
      if(!pageRef.current.contains(r.commonAncestorContainer)){setToolbar(null);return;}
      // Don't trigger inside textareas
      const anc=r.commonAncestorContainer;
      const ancEl=anc.nodeType===1?anc:anc.parentElement;
      if(ancEl.closest('textarea,input,.note-popover'))return;
      const occ=getSelectionOccurrence(pageRef.current,sel);
      if(!occ)return;
      const rect=r.getBoundingClientRect();
      setToolbar({
        x:rect.left+rect.width/2+window.scrollX,
        y:rect.top+window.scrollY,
        text:occ.text,
        occurrence:occ.occurrence
      });
      setPopover(null);
    };
    document.addEventListener('mouseup',onUp);
    document.addEventListener('touchend',onUp);
    return()=>{
      document.removeEventListener('mouseup',onUp);
      document.removeEventListener('touchend',onUp);
    };
  },[page]);

  // Dismiss popover on outside click
  useEffect(()=>{
    if(!popover&&!toolbar)return;
    const onClick=e=>{
      if(e.target.closest('.annot-toolbar,.note-popover,.hl,.note-marker'))return;
      setPopover(null);setToolbar(null);
    };
    document.addEventListener('mousedown',onClick);
    return()=>document.removeEventListener('mousedown',onClick);
  },[popover,toolbar]);

  const addAnnot=(withNote)=>{
    if(!toolbar)return;
    const id='a'+Date.now()+Math.floor(Math.random()*1000);
    const next=[...annots,{id,text:toolbar.text,occurrence:toolbar.occurrence,note:withNote?'':null}];
    setAnnots(next);
    saveAnnots(page,next);
    setToolbar(null);
    window.getSelection()?.removeAllRanges();
    if(withNote){
      // Open the popover for editing right away
      setTimeout(()=>{
        const el=pageRef.current?.querySelector(`.hl[data-id="${id}"]`);
        if(el){
          const rect=el.getBoundingClientRect();
          setPopover({id,x:rect.left+rect.width/2+window.scrollX,y:rect.bottom+window.scrollY});
        }
      },80);
    }
  };

  const updateNote=(id,note)=>{
    const next=annots.map(a=>a.id===id?{...a,note}:a);
    setAnnots(next);saveAnnots(page,next);
  };
  const removeAnnot=id=>{
    const next=annots.filter(a=>a.id!==id);
    setAnnots(next);saveAnnots(page,next);
    setPopover(null);
  };
  const clearAll=()=>{
    if(!confirm('Remove all highlights and notes on this page?'))return;
    setAnnots([]);saveAnnots(page,[]);
    setPopover(null);setToolbar(null);
  };

  const cur=PAGES[page];
  const curAnnot=popover?annots.find(a=>a.id===popover.id):null;

  return(
    <>
      <div className="toolbar">
        <span className="toolbar-title">The Sovereign Heart &nbsp;·&nbsp; Week One: The Mirror</span>
        <div className="toolbar-right">
          {annots.length>0 && (
            <button className="annot-clear" onClick={clearAll} title="Clear all highlights and notes on this page">
              Clear ({annots.length})
            </button>
          )}
          <span className="page-counter">{page+1} / {total}</span>
          <button className="mode-toggle" onClick={()=>setPrintMode(m=>!m)}>
            {printMode?'◈ Screen Mode':'⊞ Print Mode'}
          </button>
        </div>
      </div>
      <div className="stage">
        <div className="page" ref={pageRef}>
          {cur.render?cur.render():<B blocks={cur.blocks}/>}
        </div>
      </div>
      {toolbar && (
        <div className="annot-toolbar show" style={{left:toolbar.x,top:toolbar.y}}>
          <button onClick={()=>addAnnot(false)}>✦ Highlight</button>
          <button onClick={()=>addAnnot(true)}>✎ Add Note</button>
        </div>
      )}
      {popover && curAnnot && (
        <div className="note-popover" style={{left:popover.x,top:popover.y}}>
          <textarea
            autoFocus
            placeholder="Write your note…"
            value={curAnnot.note||''}
            onChange={e=>updateNote(popover.id,e.target.value)}
          />
          <div className="note-popover-actions">
            <button className="danger" onClick={()=>removeAnnot(popover.id)}>Remove</button>
            <button onClick={()=>setPopover(null)}>Done</button>
          </div>
        </div>
      )}
      <div className="nav-arrows">
        <button className="nav-btn" onClick={()=>go(page-1)} disabled={page===0}>← Previous</button>
        <span className="nav-hint">← → keyboard or click</span>
        <button className="nav-btn" onClick={()=>go(page+1)} disabled={page===total-1}>Next →</button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
