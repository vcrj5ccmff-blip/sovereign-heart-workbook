<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#F5F0E8; padding:24px 28px; }
  .eyebrow { font-family:'DM Sans',sans-serif; font-size:8px; letter-spacing:0.22em; text-transform:uppercase; color:#8A7060; margin-bottom:4px; }
  .display-xl { font-family:'Cormorant Garamond',serif; font-size:52px; font-weight:400; letter-spacing:0.04em; text-transform:uppercase; color:#1A0F08; line-height:1; }
  .display-lg { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:400; letter-spacing:0.04em; text-transform:uppercase; color:#C8B89A; line-height:1.1; margin-top:8px; }
  .display-sm { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; font-style:italic; color:#4A3020; margin-top:8px; }
  .rule { border:none; border-top:0.5px solid #C8B89A; margin:14px 0; }
</style>
</head><body>
  <div class="eyebrow">Display — Cormorant Garant</div>
  <div class="display-xl">Sovereign Stillness</div>
  <div class="display-lg">Build Your Digital Empire</div>
  <hr class="rule">
  <div class="display-sm">You are right where you are meant to be.</div>
</body></html>
