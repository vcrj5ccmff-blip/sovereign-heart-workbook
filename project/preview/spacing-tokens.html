<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#F5F0E8; padding:20px 24px; font-family:'Fraunces',sans-serif; }
  .row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .bar { height:18px; background:#C8B89A; }
  .token { font-size:8px; letter-spacing:0.14em; text-transform:uppercase; color:#4A3020; width:60px; flex-shrink:0; }
  .val   { font-size:9px; color:#4A3020; font-family:monospace; }
  .sec { font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:#A07848; margin-bottom:6px; margin-top:4px; }
</style>
</head><body>
  <div class="sec">Spacing Scale</div>
  <div class="row"><div class="token">space-2</div><div class="bar" style="width:8px;"></div><div class="val">8px</div></div>
  <div class="row"><div class="token">space-4</div><div class="bar" style="width:16px;"></div><div class="val">16px</div></div>
  <div class="row"><div class="token">space-5</div><div class="bar" style="width:24px;"></div><div class="val">24px</div></div>
  <div class="row"><div class="token">space-6</div><div class="bar" style="width:32px;"></div><div class="val">32px</div></div>
  <div class="row"><div class="token">space-7</div><div class="bar" style="width:48px;"></div><div class="val">48px</div></div>
  <div class="row"><div class="token">space-8</div><div class="bar" style="width:64px;"></div><div class="val">64px</div></div>
  <div class="row"><div class="token">space-9</div><div class="bar" style="width:96px;"></div><div class="val">96px</div></div>
  <div class="row"><div class="token">margin-page</div><div class="bar" style="width:56px;background:#3B1F0E;opacity:0.2;"></div><div class="val">56px (≈ 0.75in)</div></div>
</body></html>
