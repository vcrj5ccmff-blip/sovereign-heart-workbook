<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#F5F0E8; padding:20px 24px; display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap; }
  .arch { width:70px; height:90px; background:#2D1E12; border-radius:35px 35px 0 0; display:flex; align-items:flex-end; justify-content:center; padding-bottom:10px; }
  .arch-text { font-family:'Cormorant Garamond',serif; font-size:10px; color:#C8B89A; letter-spacing:0.1em; text-transform:uppercase; }
  .ch-badge { width:52px; height:52px; border-radius:50%; background:#C8B89A; display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:26px; color:#F5F0E8; }
  .ch-badge-dk { background:#2D1E12; }
  .div-block { width:160px; }
  .div-label { font-family:'Fraunces',serif; font-size:8px; letter-spacing:0.18em; text-transform:uppercase; color:#A07848; margin-bottom:6px; }
  .div-rule { border:none; border-top:0.5px solid #A07848; }
  .div-rule-dark { border-top-color:#2D1E12; margin-top:8px; }
  .toc { width:200px; }
  .toc-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:0.5px solid #DDD1BC; }
  .toc-name { font-family:'Fraunces',serif; font-size:8.5px; letter-spacing:0.14em; text-transform:uppercase; color:#3B1F0E; }
  .toc-num  { font-family:'Cormorant Garamond',serif; font-size:12px; color:#A07848; }
  .swatch-label { font-family:'Fraunces',serif; font-size:7px; letter-spacing:0.14em; text-transform:uppercase; color:#4A3020; margin-top:5px; }
</style>
</head><body>
  <div>
    <div class="arch"><div class="arch-text">©</div></div>
    <div class="swatch-label">#2D1E12 panel</div>
  </div>
  <div>
    <div class="ch-badge">03</div>
    <div class="swatch-label">#C8B89A antique gold</div>
  </div>
  <div>
    <div class="ch-badge ch-badge-dk">1</div>
    <div class="swatch-label">#2D1E12 panel</div>
  </div>
  <div class="div-block">
    <div class="div-label">Hairline rules</div>
    <div class="div-rule"></div>
    <div class="div-rule div-rule-dark"></div>
    <div class="swatch-label">aged brass · espresso</div>
  </div>
  <div class="toc">
    <div class="div-label">TOC rows</div>
    <div class="toc-row"><span class="toc-name">Section 01</span><span class="toc-num">4</span></div>
    <div class="toc-row"><span class="toc-name">Section 02</span><span class="toc-num">12</span></div>
    <div class="toc-row"><span class="toc-name">Section 03</span><span class="toc-num">24</span></div>
  </div>
</body></html>
