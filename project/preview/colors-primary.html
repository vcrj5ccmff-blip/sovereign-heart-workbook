<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#F5F0E8; font-family:'Fraunces',sans-serif; padding:20px; }
  .row { display:flex; gap:12px; }
  .swatch { flex:1; height:80px; border-radius:0; }
  .labels { display:flex; gap:12px; margin-top:10px; }
  .label { flex:1; }
  .name { font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:#4A3020; }
  .hex  { font-size:10px; color:#3B1F0E; margin-top:2px; font-family:monospace; }
</style>
</head><body>
<div class="row">
  <div class="swatch" style="background:#F5F0E8;border:1px solid #DDD1BC;"></div>
  <div class="swatch" style="background:#C8B89A;"></div>
  <div class="swatch" style="background:#A07848;"></div>
  <div class="swatch" style="background:#3B1F0E;"></div>
  <div class="swatch" style="background:#4A3020;"></div>
  <div class="swatch" style="background:#2D1E12;"></div>
</div>
<div class="labels">
  <div class="label"><div class="name">Cream</div><div class="hex">#F5F0E8</div></div>
  <div class="label"><div class="name">Antique Gold</div><div class="hex">#C8B89A</div></div>
  <div class="label"><div class="name">Aged Brass</div><div class="hex">#A07848</div></div>
  <div class="label"><div class="name">Espresso</div><div class="hex">#3B1F0E</div></div>
  <div class="label"><div class="name">Mid</div><div class="hex">#4A3020</div></div>
  <div class="label"><div class="name">Panel</div><div class="hex">#2D1E12</div></div>
</div>
</body></html>
